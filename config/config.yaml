project:
  name: "Ubersuggest Automation"
  version: "1.0.0"

# إعدادات WebDroid
webdroid:
  host: "127.0.0.1"
  port: 8765
  timeout: 30

# إعدادات Ubersuggest
ubersuggest:
  base_url: "https://app.neilpatel.com"
