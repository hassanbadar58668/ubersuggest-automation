name: Ubersuggest Automation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps
    
    - name: Create directories
      run: |
        mkdir -p logs data sessions screenshots debug
    
    - name: Run Playwright test
      run: |
        python src/test_playwright.py
    
    - name: Upload results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: automation-results
        path: |
          logs/
          data/
          sessions/
          screenshots/
          debug/
          *.log
          *.png
          *.html
